<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LibFlow | Secure Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f2ed;
            --accent: #5f7a6b;
            --text: #3e362e;
            --white: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .login-card {
            background: var(--white);
            padding: 50px;
            border-radius: 35px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(95, 122, 107, 0.1);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: var(--text);
            margin-bottom: 10px;
        }

        p { color: #8e857d; font-size: 0.9rem; margin-bottom: 30px; }

        .input-group { text-align: left; margin-bottom: 20px; }

        label { display: block; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); margin-bottom: 8px; }

        input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1.5px solid #e8e2db;
            font-family: 'Inter';
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(95, 122, 107, 0.1); }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(95, 122, 107, 0.2); }

        .back-link { display: block; margin-top: 20px; font-size: 0.8rem; color: #8e857d; text-decoration: none; }
        .back-link:hover { color: var(--accent); }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Login</h2>
    <p>Accessing the <b>{{ role|capitalize }}</b> Portal</p>
    
    <form action="/login_verify" method="POST">
        <div class="input-group">
            <label>Username</label>
            <input type="text" name="username" placeholder="Enter your username" required>
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-login">Verify & Enter</button>
    </form>
    
    <a href="/" class="back-link">← Switch Role</a>
</div>

</body>
</html>
